name: Tests

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Check Maven version
        run: |
          MVN_VERSION=$(mvn --version | awk '/Apache Maven/ {print $3; exit}')
          echo "Detected Maven $MVN_VERSION"
          if [ "$(printf '%s\n' '3.9.9' "$MVN_VERSION" | sort -V | head -n 1)" != "3.9.9" ]; then
            echo "Maven 3.9.9 or newer is required."
            exit 1
          fi

      - name: Run Maven verify
        run: mvn --batch-mode --no-transfer-progress verify
